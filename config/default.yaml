schema_version: "2.0"
timezone: "America/Sao_Paulo"

run:
  mode: "operational"
  reference_time: null
  event_name: null

paths:
  history_db: "data/history.sqlite"
  runs_dir: "data/runs"
  interim_dir: "data/interim"
  timeseries_dir: "data/timeseries"
  spatial_dir: "data/spatial"
  logs_dir: "logs"

ingest:
  request_days: 7
  timeout_seconds: 15
  observed_sources:
    - "ana"
    - "inmet"
  forecast_grid_sources:
    - "pending_definition"

model:
  id: "mgb"
  runner_app: "apps/mgb_runner/main.py"

reports:
  formats:
    - "sqlite"
    - "markdown"

states:
  data:
    - "raw"
    - "curated"
    - "approved"
  runs:
    - "draft"
    - "ready"
    - "executed"
    - "reviewed"
    - "published"