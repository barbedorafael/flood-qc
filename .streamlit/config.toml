[theme]
base = "light"
primaryColor = "#1864ab"
backgroundColor = "#f7fbfd"
secondaryBackgroundColor = "#ecf4f7"
textColor = "#183046"
linkColor = "#1864ab"
codeBackgroundColor = "#e7f1f4"
borderColor = "#c9d9e2"
font = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
headingFont = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 15
baseFontWeight = 400
headingFontSizes = ["32px", "24px", "20px", "16px", "14px", "12px"]
headingFontWeights = [600, 600, 600, 500, 500, 500]
linkUnderline = false
baseRadius = "10px"
buttonRadius = "10px"
showWidgetBorder = true
showSidebarBorder = true
chartCategoricalColors = ["#1864ab", "#0b7285", "#2b8a3e", "#d9480f", "#5f3dc4", "#f08c00", "#5c6773"]
chartSequentialColors = ["#f1f8fb", "#dceef6", "#c4e2f0", "#abd6ea", "#8bc3e1", "#64add6", "#4096c7", "#267fb5", "#17689b", "#0f4f77"]
dataframeBorderColor = "#c9d9e2"
dataframeHeaderBackgroundColor = "#e9f2f6"

[theme.sidebar]
backgroundColor = "#eef5f8"
secondaryBackgroundColor = "#e2edf2"
codeBackgroundColor = "#dde9ef"
textColor = "#183046"
borderColor = "#c9d9e2"
primaryColor = "#1864ab"
